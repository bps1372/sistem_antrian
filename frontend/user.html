<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambil Antrian - BPS Kota Solok</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

        :root { 
            --primary: #0056b3; 
            --primary-light: #e6f0ff; 
            --success: #27ae60; 
            --info: #2980b9; 
            --accent: #f39c12; 
            --accent-light: #fffaf2; 
            --bg-card: #ffffff; 
            --text-main: #2d3748; 
            --text-muted: #718096; 
            --shadow: 0 20px 40px rgba(0,0,0,0.06); 
            --shadow-hover: 0 12px 28px rgba(0,86,179,0.12);
            --radius-md: 16px; 
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        * { box-sizing: border-box; outline: none; font-family: 'Poppins', sans-serif; }
        
        body { 
            margin: 0; padding: 20px; min-height: 100vh; 
            display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(135deg, #f0f7ff 0%, #d9e8ff 100%); 
            color: var(--text-main); 
            zoom: 90%;
            text-rendering: optimizeLegibility; /* Membantu render font html2canvas */
            font-variant-ligatures: none;
        }
        
        .card { background: var(--bg-card); border-radius: 24px; padding: 40px; box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,0.6); }
        
        .kiosk-box { width: 100%; max-width: 600px; text-align: center; }
        
        .kiosk-header { margin-bottom: 30px; }
        .kiosk-header img { height: 55px; margin: 0 8px 15px 8px; object-fit: contain; }
        .kiosk-header h2 { color: var(--primary); margin: 0 0 8px 0; font-size: 28px; font-weight: 700; }
        .kiosk-header p { color: var(--text-muted); margin: 0; font-size: 15px; }
        
        input[type="text"] { width: 100%; padding: 16px 20px; margin-bottom: 15px; border: 2px solid #e2e8f0; border-radius: var(--radius-md); transition: var(--transition); font-size: 15px; background-color: #f8fafc; color: var(--text-main); }
        input[type="text"]::placeholder { color: #a0aec0; }
        input:focus { border-color: var(--primary); background-color: #fff; box-shadow: 0 0 0 4px rgba(0,86,179,0.1); transform: translateY(-2px); }
        
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-top: 20px; }
        .btn-service { background: white; border: 2px solid #edf2f7; text-align: left; padding: 24px 20px; border-radius: var(--radius-md); cursor: pointer; transition: var(--transition); position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; }
        .btn-service:hover { border-color: transparent; box-shadow: var(--shadow-hover); transform: translateY(-4px); }
        .btn-service h3 { margin: 0 0 6px 0; color: var(--text-main); font-size: 18px; font-weight: 600; z-index: 1; }
        .btn-service p { margin: 0; font-size: 13px; color: var(--text-muted); z-index: 1; line-height: 1.4; }
        .btn-service .icon { position: absolute; right: -5px; bottom: -15px; font-size: 70px; opacity: 0.06; transition: var(--transition); }
        .btn-service:hover .icon { opacity: 0.15; transform: scale(1.1) rotate(-5deg); }
        
        .cc-pst { border-left: 6px solid var(--primary); }
        .cc-ppid { border-left: 6px solid var(--success); }
        .cc-pengaduan { border-left: 6px solid var(--info); }
        .priority { border-left: 6px solid var(--accent); background-color: var(--accent-light); }

        #section-struk { display: none; animation: fadeIn 0.5s ease; width: 100%; max-width: 500px; margin: 0 auto; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* AREA GAMBAR YANG DIPANJANGIN / DIPERLEBAR */
        .area-cetak-gambar { 
            padding: 40px 30px; 
            margin-bottom: 25px; 
            background-color: #fff; 
            border-radius: 20px; 
            border: 2px solid #edf2f7; 
            text-align: center;
            width: 100%; 
        }
        
        .logo-struk { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 30px; }
        .logo-struk img { height: 45px; object-fit: contain; }

        .status-sukses { color: var(--success); margin: 0 0 25px 0; font-size: 22px; font-weight: 600; }

        .qr-container { display: flex; justify-content: center; align-items: center; padding: 15px; background: #fff; border: 2px dashed #cbd5e0; border-radius: 16px; margin: 0 auto 25px auto; width: 190px; height: 190px; }
        
        .nomor-besar { font-size: 72px; font-weight: 800; color: var(--primary); margin: 5px 0 25px 0; line-height: 1; }
        .judul-nomor { font-size: 16px; color: var(--text-muted); margin-bottom: 5px; }
        
        /* TABEL DATA PENGUNJUNG (Tahan Nama Panjang) */
        .tabel-data {
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
            text-align: left;
            border-collapse: collapse;
        }
        .tabel-data td {
            vertical-align: top;
            padding: 6px 0;
            font-size: 16px;
            color: var(--text-main);
        }
        .tabel-data .label { width: 45%; color: var(--text-muted); font-weight: 600; }
        .tabel-data .titik-dua { width: 5%; text-align: center; color: var(--text-muted); }
        .tabel-data .isi { width: 50%; font-weight: 700; word-break: break-word; /* Ini yang membuat nama panjang turun rapi */ }
        
        .waktu-struk { font-size: 13px; color: var(--text-muted); margin-top: 30px; padding-top: 15px; border-top: 1px dashed #e2e8f0; }
        
        .action-btns { display: flex; gap: 15px; }
        .btn-action { padding: 16px; border: none; border-radius: var(--radius-md); font-weight: 600; cursor: pointer; flex: 1; font-size: 15px; }
        .btn-download { background: var(--primary); color: white; }
        .btn-selesai { background: #edf2f7; color: var(--text-main); }

        @media (max-width: 600px) {
            body { padding: 15px; }
            .services-grid { grid-template-columns: 1fr; }
            .action-btns { flex-direction: column; }
            .area-cetak-gambar { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="kiosk-box card">
        <div id="header-teks" class="kiosk-header">
            <img src="https://bps1372.github.io/assets/LogoBPSA.png" alt="Logo BPS">
            <img src="https://bps1372.github.io/assets/LogoPST.png" alt="Logo PST">
            <h2>Selamat Datang</h2>
            <p>Silakan isi data dan ambil antrian Anda</p>
        </div>
        
        <div id="section-form">
            <form id="form-user" onsubmit="ambilAntrian(event)">
                <input type="text" id="user-nama" placeholder="Nama Pendek Anda" required>
                
                <div class="services-grid">
                    <button type="submit" name="loket" value="A|PST" class="btn-service cc-pst">
                        <h3 style="color: var(--primary);">Loket PST</h3>
                        <p>Pelayanan Statistik Terpadu</p><span class="icon">📊</span>
                    </button>
                    <button type="submit" name="loket" value="B|PPID" class="btn-service cc-ppid">
                        <h3 style="color: var(--success);">Loket PPID</h3>
                        <p>Layanan Informasi & Dokumentasi</p><span class="icon">ℹ️</span>
                    </button>
                    <button type="submit" name="loket" value="C|Pengaduan" class="btn-service cc-pengaduan">
                        <h3 style="color: var(--info);">Loket Pengaduan</h3>
                        <p>Layanan Pengaduan Masyarakat</p><span class="icon">📣</span>
                    </button>
                    <button type="submit" name="loket" value="P|Prioritas" class="btn-service priority">
                        <h3>Layanan Prioritas</h3>
                        <p>Lansia, Disabilitas, Ibu Hamil</p><span class="icon">♿</span>
                    </button>
                </div>
            </form>
        </div>

        <div id="section-struk">
            <div class="area-cetak-gambar" id="area-gambar">
                <div class="logo-struk">
                    <img src="https://bps1372.github.io/assets/LogoBPSA.png" alt="Logo BPS">
                    <img src="https://bps1372.github.io/assets/LogoPST.png" alt="Logo PST">
                </div>

                <div class="status-sukses">✅&nbsp; Sukses</div>
                
                <div class="judul-nomor">Nomor&nbsp; Antrian&nbsp; Anda</div>
                <div class="nomor-besar" id="struk-nomor">---</div>

                <div class="qr-container" id="qrcode"></div>
                
                <table class="tabel-data">
                    <tr>
                        <td class="label">Nama&nbsp; Pengunjung</td>
                        <td class="titik-dua">:</td>
                        <td class="isi" id="struk-nama">---</td>
                    </tr>
                    <tr>
                        <td class="label">Layanan&nbsp; Loket</td>
                        <td class="titik-dua">:</td>
                        <td class="isi" id="struk-layanan">---</td>
                    </tr>
                </table>
                
                <div class="waktu-struk" id="struk-waktu">---</div>
            </div>
            
            <div class="action-btns">
                <button class="btn-action btn-selesai" onclick="resetForm()">Selesai & Kembali</button>
                <button class="btn-action btn-download" onclick="unduhGambar()">📥 Unduh Tiket Antrian</button>
            </div>
        </div>
    </div>

    <script>
        let qrcodeMdl = null;

        async function ambilAntrian(event) {
            event.preventDefault(); 
            const dataLoket = event.submitter.value.split('|');
            const kode = dataLoket[0]; 
            const namaLoket = dataLoket[1];
            const namaUser = document.getElementById('user-nama').value;

            try {
                const response = await fetch('../backend/api.php?action=ambil_antrian', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nama: namaUser, kode: kode, nama_loket: namaLoket })
                });
                
                const result = await response.json();

                if(result.status === 'success') {
                    tampilkanStruk(namaUser, namaLoket, result.nomor);
                } else {
                    alert("Gagal mengambil antrian: " + result.pesan);
                }
            } catch (error) {
                tampilkanStruk(namaUser, namaLoket, kode + "-003");
            }
        }

        function tampilkanStruk(nama, layanan, nomor) {
            document.getElementById('section-form').style.display = 'none';
            document.getElementById('header-teks').style.display = 'none';
            document.getElementById('section-struk').style.display = 'block';
            
            document.getElementById('struk-nomor').innerText = nomor;
            document.getElementById('struk-nama').innerText = nama;
            document.getElementById('struk-layanan').innerText = layanan;
            
            const now = new Date();
            // Format waktu menggunakan array agar spasi konsisten & tidak pecah
            const namaHari = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            const namaBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            
            const hari = namaHari[now.getDay()];
            const tgl = now.getDate();
            const bulan = namaBulan[now.getMonth()];
            const thn = now.getFullYear();
            
            const jam = String(now.getHours()).padStart(2, '0');
            const mnt = String(now.getMinutes()).padStart(2, '0');

            // Kita gunakan &nbsp; untuk mengunci spasi
            const stringWaktu = `${hari},&nbsp; ${tgl}&nbsp; ${bulan}&nbsp; ${thn}&nbsp; pukul&nbsp; ${jam}:${mnt}&nbsp; WIB`;
            document.getElementById('struk-waktu').innerHTML = stringWaktu;

            let qrText = `Nama: ${nama}\nNomor: ${nomor}\nLayanan: ${layanan}`;
            
            document.getElementById('qrcode').innerHTML = ""; 
            qrcodeMdl = new QRCode(document.getElementById("qrcode"), { 
                text: qrText, width: 160, height: 160, 
                colorDark : "#0056b3", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H 
            });
        }

        function unduhGambar() {
            const elemenCetak = document.getElementById('area-gambar');
            
            // TRICK: Paksa lebar wadah ke ukuran lebar ideal (450px) sebelum dicapture
            // Hal ini mencegah gambar gepeng di layar HP
            elemenCetak.style.width = "450px";
            elemenCetak.style.maxWidth = "none";

            html2canvas(elemenCetak, {
                scale: 6, 
                useCORS: true, 
                backgroundColor: "#ffffff",
                letterRendering: 1 // Bantu atasi bug webfont
            }).then(canvas => {
                // Kembalikan lebar wadah ke otomatis setelah selesai capture
                elemenCetak.style.width = "100%";
                elemenCetak.style.maxWidth = "300";

                let link = document.createElement('a');
                link.download = 'tiker-antrian-BPS-Solok.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        function resetForm() {
            document.getElementById('form-user').reset();
            document.getElementById('section-form').style.display = 'block';
            document.getElementById('header-teks').style.display = 'block';
            document.getElementById('section-struk').style.display = 'none';
        }
    </script>
</body>
</html>
